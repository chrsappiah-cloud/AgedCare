name: CI/CD

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-build:
    name: iOS Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve package dependencies
        run: xcodebuild -resolvePackageDependencies -project AgedCare.xcodeproj

      - name: Build iOS App
        run: |
          xcodebuild -project AgedCare.xcodeproj \
            -scheme AgedCareApp \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -derivedDataPath /tmp/Build \
            build-for-testing \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | xcpretty && exit ${PIPESTATUS[0]}

      - name: Run iOS Tests
        run: |
          xcodebuild -project AgedCare.xcodeproj \
            -scheme AgedCareApp \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -derivedDataPath /tmp/Build \
            -enableCodeCoverage YES \
            test-without-building \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | xcpretty && exit ${PIPESTATUS[0]}

      - name: Code Coverage Report
        if: always()
        run: |
          RESULT=$(find /tmp/Build/Logs/Test -name "*.xcresult" -type d | head -1)
          if [ -n "$RESULT" ]; then
            xcrun xccov view --report "$RESULT" | head -40
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: /tmp/Build/Logs/Test/*.xcresult

  backend-lint:
    name: Backend Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bottle pg8000

      - name: Syntax check
        run: python -m py_compile backend/server.py backend/ai_monitor.py

  shared-package:
    name: Shared Package Validation
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Shared Package
        run: |
          xcodebuild -project AgedCare.xcodeproj \
            -scheme AgedCareShared \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -derivedDataPath /tmp/Build \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | xcpretty && exit ${PIPESTATUS[0]}

  deploy:
    name: Archive & Export for Distribution
    runs-on: macos-15
    timeout-minutes: 30
    needs: [ios-build, shared-package]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Resolve package dependencies
        run: xcodebuild -resolvePackageDependencies -project AgedCare.xcodeproj

      - name: Archive
        run: |
          xcodebuild -project AgedCare.xcodeproj \
            -scheme AgedCareApp \
            -destination 'generic/platform=iOS' \
            -archivePath /tmp/AgedCare.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath /tmp/AgedCare.xcarchive \
            -exportPath /tmp/AgedCareExport \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO || echo "Export requires signing identity — skipped in CI"

      - name: Upload Archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive
          path: /tmp/AgedCare.xcarchive
          retention-days: 14
